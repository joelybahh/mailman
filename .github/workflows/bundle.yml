name: Build And Release Bundles

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            formats: app,dmg
            artifact_name: macos
          - os: ubuntu-latest
            formats: deb
            artifact_name: linux
          - os: windows-latest
            formats: wix,nsis
            artifact_name: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux Packaging Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows Packaging Dependencies
        if: runner.os == 'Windows'
        run: |
          choco install wixtoolset -y
          choco install nsis -y

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Prepare macOS DMG environment
        if: runner.os == 'macOS'
        run: |
          # Detach any lingering disk images whose volume name matches the app
          # so hdiutil doesn't fail with "Resource busy" on a stale mount.
          hdiutil info \
            | awk '/\/Volumes\/Mailman/{print $1}' \
            | xargs -I{} hdiutil detach '{}' --force 2>/dev/null || true
          # Remove any leftover packager output to avoid name collisions.
          rm -rf dist/packager

      - name: Build Bundles
        run: cargo packager --release --formats ${{ matrix.formats }}

      - name: Upload Bundles Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.artifact_name }}
          path: dist/packager/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: bundle
    steps:
      - name: Download All Bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true
          path: release-artifacts

      - name: Archive macOS .app bundles
        run: |
          find release-artifacts -type d -name "*.app" -print0 | while IFS= read -r -d '' app_dir; do
            app_parent="$(dirname "$app_dir")"
            app_name="$(basename "$app_dir")"
            tar -czf "${app_dir}.tar.gz" -C "$app_parent" "$app_name"
          done

      - name: Create Release And Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.deb
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.app.tar.gz
